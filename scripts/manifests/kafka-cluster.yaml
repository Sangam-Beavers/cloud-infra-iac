# install-k8s-stack.sh install_kafka 가 적용 (정적) — Strimzi 단일 브로커 Kafka (gb-kafka, KRaft).
# 온프렘 gb-kafka(Kafka 4.1.2) 이관. stage 검증용: dual-role 1노드 + ephemeral 스토리지(재시작 시
# 데이터 소실 허용 — prod는 persistent-claim). 내부 PLAINTEXT 리스너만(외부 노출 없음), 인증은
# NetworkPolicy로 격리(A안). 단일 브로커라 내부 토픽 RF/ISR 전부 1로 강제(기본 3이면 생성 실패).
# metadataVersion은 생략 — 신규 클러스터라 Strimzi가 Kafka 버전 기본값 사용(필요 시 핀).
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: kafka
  labels:
    strimzi.io/cluster: gb-kafka
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
  resources:
    requests: { memory: 1Gi, cpu: 500m }
    limits: { memory: 2Gi, cpu: "2" }
  jvmOptions:
    "-Xms": "1024m"
    "-Xmx": "1024m"
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: gb-kafka
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.1.2
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      # 단일 브로커 — 내부 토픽 RF/ISR 전부 1 (기본 3이면 단일 브로커에서 생성 실패)
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    topicOperator: {}   # KafkaTopic CR 조정용 (userOperator는 A안이라 생략)
