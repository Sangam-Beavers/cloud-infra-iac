# install-k8s-stack.sh 의 install_eso 가 적용하는 ESO ClusterSecretStore 2종 입니다.
# 비밀은 Secrets Manager 에, 비밀이 아닌 인프라 동적값은 Parameter Store 에 두며 같은 ESO ServiceAccount (IRSA)를 씁니다.
# 렌더: REGION=.. envsubst '${REGION}' < 이파일 | kubectl apply -f -
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ${REGION}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-parameter-store
spec:
  provider:
    aws:
      service: ParameterStore
      region: ${REGION}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
