# install-k8s-stack.sh install_eso 가 적용 — ESO ClusterSecretStore 2종.
# 비밀은 Secrets Manager, 비밀 아닌 인프라 동적값은 Parameter Store. 같은 ESO ServiceAccount(IRSA)를 쓴다.
# 렌더: REGION=.. envsubst '${REGION}' < 이파일 | kubectl apply -f -
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ${REGION}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-parameter-store
spec:
  provider:
    aws:
      service: ParameterStore
      region: ${REGION}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
