# install-k8s-stack.sh 의 ensure_app_namespaces 가 ArgoCD 배포 네임스페이스마다 적용하는 보충 RBAC 입니다.
# ArgoCD 캐시 동기화 (drift 감지)는 네임스페이스의 '모든' 리소스 타입을 list 하는데, AmazonEKSEditPolicy 는
# 일부 타입 (CRD·CSIStorageCapacity 등)에 read 를 주지 않아 forbidden 이 납니다. 그룹별로 추가하면 whack-a-mole 이
# 되므로 네임스페이스 read-all 과 stack CRD 쓰기로 보충합니다. access entry 의 K8s username 이 곧 principal ARN 이라 그 User 에 바인딩합니다.
# 렌더: ns=.. argo_arn=.. envsubst '${ns} ${argo_arn}' < 이파일 | kubectl apply -f -
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-crd-edit
  namespace: ${ns}
rules:
  # 캐시 동기화용 네임스페이스 전체 리소스 타입 list (EditPolicy 미포함분 read 보충)
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  # ArgoCD 가 배포·관리하는 stack CRD 쓰기 권한 (Edit 미포함분)
  - apiGroups: ["cilium.io", "external-secrets.io", "elbv2.k8s.aws"]
    resources: ["*"]
    verbs: ["create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-crd-edit
  namespace: ${ns}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-crd-edit
subjects:
  - kind: User
    name: ${argo_arn}
    apiGroup: rbac.authorization.k8s.io
