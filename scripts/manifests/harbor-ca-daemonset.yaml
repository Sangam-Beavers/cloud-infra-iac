# install-k8s-stack.sh 의 install_harbor 가 적용합니다 (정적, 치환 없음). 노드 containerd 가 사내 Harbor CA 를
# 신뢰하게 하는 '권위 있는' 경로입니다.
#
# 왜 DaemonSet 인가 (userdata 로 옮겼다가 되돌린 이유):
#   CA 신뢰는 anchor 파일을 /etc/pki/ca-trust 에 두고 update-ca-trust + containerd 재시작으로 섭니다.
#   node user_data 도 같은 일을 하지만, 부팅 시점 'is-active && restart' (조건부)라 fresh 노드에서 containerd 가
#   CA 를 재로드하지 못하는 레이스가 있습니다 (2026-06-16 stage 전체 ImagePullBackOff 장애의 원인).
#   DaemonSet 은 노드가 완전히 뜬 뒤 containerd 를 '확정적으로' 재시작하므로 신뢰가 반드시 섭니다.
#   user_data 의 anchor 쓰기는 best-effort 로 남겨두되, 신뢰의 보증은 이 DaemonSet 이 집니다.
#
# 재시작 조건 (재시작 루프 방지 + CA 회전 대응):
#   ① anchor 내용이 ConfigMap 과 다르면 (미설치/회전) 재설치, ② 이 노드에서 아직 한 번도 재시작 안 했으면 (.harbor-ca-restarted 부재)
#   → 둘 중 하나라도 참이면 update-ca-trust + containerd 재시작. user_data 가 anchor 를 미리 써놔도 ②가 '첫 1회'를
#   보장하므로, 과거의 'anchor 내용 같으면 skip → 재시작 누락' 버그를 막습니다.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: harbor-ca-trust
  namespace: kube-system
  labels: { app: harbor-ca-trust }
spec:
  selector:
    matchLabels: { app: harbor-ca-trust }
  updateStrategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 2 }
  template:
    metadata:
      labels: { app: harbor-ca-trust }
    spec:
      hostPID: true
      priorityClassName: system-node-critical
      tolerations:
        - operator: Exists
      containers:
        - name: install-ca
          image: public.ecr.aws/amazonlinux/amazonlinux:2023
          securityContext:
            privileged: true
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              command -v nsenter >/dev/null 2>&1 || dnf install -y util-linux-core >/dev/null 2>&1 || true
              need_restart=0
              if [ ! -f /host-anchors/sb-local-ca.crt ] || \
                 [ "$(cat /host-anchors/sb-local-ca.crt)" != "$(cat /ca/sb-local-ca.crt)" ]; then
                cat /ca/sb-local-ca.crt > /host-anchors/sb-local-ca.crt   # 미설치/회전
                need_restart=1
              fi
              [ -f /host-anchors/.harbor-ca-restarted ] || need_restart=1   # 이 노드 첫 1회 보장
              if [ "$need_restart" = 1 ]; then
                nsenter --target 1 --mount --uts --ipc --net --pid -- update-ca-trust
                nsenter --target 1 --mount --uts --ipc --net --pid -- systemctl restart containerd
                touch /host-anchors/.harbor-ca-restarted
                echo "사내 CA 설치/갱신 + containerd 재시작 완료"
              else
                echo "사내 CA 이미 신뢰됨 (anchor 일치 + 재시작 이력 있음) — skip"
              fi
              exec sleep infinity
          volumeMounts:
            - { name: ca, mountPath: /ca, readOnly: true }
            - { name: host-anchors, mountPath: /host-anchors }
      volumes:
        - name: ca
          configMap: { name: harbor-ca }
        - name: host-anchors
          hostPath: { path: /etc/pki/ca-trust/source/anchors, type: DirectoryOrCreate }
