# install-k8s-stack.sh 의 install_kafka 가 적용하는 (A안 격리) 정책으로, kafka ns 접근을 백엔드·operator 로 제한합니다.
# PLAINTEXT 라 네트워크 격리로 보호합니다. podSelector 는 gb-kafka 의 Strimzi pod (브로커·entity-operator)를 가리킵니다.
# 렌더: APP_NS=.. envsubst '${APP_NS}' < 이파일 | kubectl apply -f -  (APP_NS=백엔드 네임스페이스)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kafka-allow-backend
  namespace: kafka
spec:
  podSelector:
    matchLabels:
      strimzi.io/cluster: gb-kafka
  policyTypes:
    - Ingress
  ingress:
    # ① 같은 kafka ns 내부는 전 포트를 허용합니다 (cluster-operator·entity-operator ↔ broker 관리·복제·메타데이터)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kafka
    # ② 백엔드 네임스페이스에서는 client 9092 포트만
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ${APP_NS}
      ports:
        - protocol: TCP
          port: 9092
