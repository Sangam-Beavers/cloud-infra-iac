# install-k8s-stack.sh 의 install_tgb 가 서비스마다 적용하여 내부 ALB (api-gateway, terraform)의 target group 에
# 백엔드 파드를 등록합니다 (ALB Controller 가 관리, targetType: ip). 값은 PS /sb/{env}/tgb/* 에서 가져옵니다 (terraform 게시).
# serviceRef.port 는 Service 의 'http' 포트명으로 참조하므로 번호와 무관합니다. networking 은 ALB SG → 컨테이너 포트입니다.
# 렌더: SVC/APP_NS/TG_ARN/PORT/ALB_SG 를 envsubst.
apiVersion: elbv2.k8s.aws/v1beta1
kind: TargetGroupBinding
metadata:
  name: ${SVC}
  namespace: ${APP_NS}
  labels:
    app: ${SVC}
spec:
  serviceRef:
    name: ${SVC}
    port: http
  targetGroupARN: ${TG_ARN}
  targetType: ip
  networking:
    ingress:
      - from:
          - securityGroup:
              groupID: ${ALB_SG}
        ports:
          - protocol: TCP
            port: ${PORT}
