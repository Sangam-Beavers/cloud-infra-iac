# install-k8s-stack.sh 의 install_harbor 가 앱 네임스페이스 (ArgoCD 배포 대상)마다 적용하는 Harbor pull secret 입니다.
# SM sb/{env}/harbor/robot (robot 자격증명)을 dockerconfigjson 으로 변환해 harbor-dockercfg 를 만듭니다.
# {{ }}는 ESO 템플릿 (런타임 평가)이라 $가 없으므로 envsubst 가 건드리지 않습니다.
# 렌더: ns=.. hhost=.. sm_name=.. envsubst '${ns} ${hhost} ${sm_name}' < 이파일 | kubectl apply -f -
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-dockercfg
  namespace: ${ns}
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: harbor-dockercfg
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"${hhost}":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: ${sm_name}
        property: username
    - secretKey: password
      remoteRef:
        key: ${sm_name}
        property: password
